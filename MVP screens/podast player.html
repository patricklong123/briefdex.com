<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Briefdex — Podcast Player</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --g950: #050d08;
  --g900: #0a1a10;
  --g850: #132418;
  --g800: #1a3a28;
  --g700: #1e4a2f;
  --g600: #2d6a42;
  --g500: #3d8a55;
  --g200: #a8d4b4;
  --g100: #d4e8d8;
  --gold: #c9a84c;
  --gold-light: #d4b86a;
  --gold-soft: #e8d4a0;
  --cream: #f5edd8;
  --white: #ffffff;
  --text-dim: rgba(255,255,255,0.5);
  --text-faint: rgba(255,255,255,0.3);
  --line: rgba(255,255,255,0.08);
}

body {
  background: #0a0a0a;
  font-family: 'DM Sans', sans-serif;
  padding: 56px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 32px;
  min-height: 100vh;
}

.page-title {
  text-align: center;
  margin-bottom: 16px;
}
.page-title h1 {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  color: var(--gold);
  margin-bottom: 6px;
}
.page-title p {
  color: rgba(255,255,255,0.4);
  font-size: 0.8rem;
  font-weight: 300;
}

/* PHONE FRAME */
.phone {
  width: 380px;
  height: 800px;
  background: var(--g950);
  border-radius: 52px;
  border: 2px solid rgba(255,255,255,0.1);
  box-shadow:
    0 0 0 8px #1a1a1a,
    0 0 0 10px rgba(255,255,255,0.04),
    0 40px 80px rgba(0,0,0,0.7);
  position: relative;
  overflow: hidden;
  flex-shrink: 0;
}

.phone::before {
  content: '';
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  width: 110px;
  height: 32px;
  background: #050505;
  border-radius: 24px;
  z-index: 50;
}

.screen {
  position: absolute;
  inset: 0;
  border-radius: 52px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  background: var(--g900);
  background-image:
    radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,168,76,0.12) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 100% 70%, rgba(61,138,85,0.08) 0%, transparent 60%);
}

/* STATUS BAR */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 56px 28px 0;
  font-size: 0.78rem;
  font-weight: 600;
  color: rgba(255,255,255,0.75);
  font-family: 'DM Mono', monospace;
  flex-shrink: 0;
  z-index: 10;
  position: relative;
}
.status-icons { display: flex; gap: 5px; align-items: center; }
.signal-dots { display: flex; gap: 2px; align-items: end; }
.signal-dots div {
  width: 3px;
  background: rgba(255,255,255,0.75);
  border-radius: 1px;
}
.signal-dots div:nth-child(1) { height: 4px; }
.signal-dots div:nth-child(2) { height: 6px; }
.signal-dots div:nth-child(3) { height: 8px; }
.signal-dots div:nth-child(4) { height: 10px; }
.battery {
  width: 22px;
  height: 11px;
  border: 1.2px solid rgba(255,255,255,0.6);
  border-radius: 3px;
  position: relative;
  padding: 1.5px;
}
.battery::after {
  content: '';
  position: absolute;
  right: -3px;
  top: 3px;
  width: 2px;
  height: 4px;
  background: rgba(255,255,255,0.6);
  border-radius: 0 1px 1px 0;
}
.battery-fill {
  width: 75%;
  height: 100%;
  background: rgba(255,255,255,0.85);
  border-radius: 1px;
}
.wifi-icon {
  width: 14px;
  height: 10px;
  position: relative;
}
.wifi-icon::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.75);
  clip-path: polygon(50% 0%, 100% 60%, 80% 60%, 80% 100%, 20% 100%, 20% 60%, 0% 60%);
}

/* TOP NAV */
.player-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 24px 0;
  z-index: 10;
  position: relative;
}

.icon-btn {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.8);
  cursor: pointer;
  transition: background 0.2s ease;
}
.icon-btn:hover { background: rgba(255,255,255,0.1); }

.player-top-label {
  text-align: center;
  flex: 1;
}
.player-top-eyebrow {
  font-size: 0.58rem;
  font-weight: 600;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 3px;
}
.player-top-title {
  font-size: 0.72rem;
  color: rgba(255,255,255,0.6);
  font-weight: 400;
}

/* CONTENT */
.player-content {
  flex: 1;
  padding: 20px 24px 32px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.player-content::-webkit-scrollbar { display: none; }

/* COVER ART - fills available space */
.cover-art {
  flex: 1;
  width: 100%;
  border-radius: 22px;
  margin: 8px 0 28px;
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(ellipse at top right, rgba(201,168,76,0.3), transparent 65%),
    radial-gradient(ellipse at bottom left, rgba(61,138,85,0.25), transparent 65%),
    linear-gradient(135deg, var(--g800) 0%, var(--g700) 50%, var(--g850) 100%);
  border: 1px solid rgba(201,168,76,0.2);
  box-shadow: 0 16px 50px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,168,76,0.05);
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  padding: 28px;
  min-height: 380px;
}

/* BOTTOM STACK - progress + controls + speed */
.bottom-stack {
  display: flex;
  flex-direction: column;
  gap: 22px;
  flex-shrink: 0;
}

.cover-eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(201,168,76,0.15);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 20px;
  padding: 4px 11px 4px 9px;
  font-size: 0.6rem;
  color: var(--gold-light);
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  align-self: flex-start;
}
.cover-eyebrow::before {
  content: '';
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.cover-main {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.cover-script {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--gold-light);
  font-weight: 400;
}

.cover-title {
  font-family: 'Playfair Display', serif;
  font-size: 2.4rem;
  font-weight: 900;
  color: var(--white);
  line-height: 1.02;
  letter-spacing: -0.015em;
}

.cover-date {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: rgba(255,255,255,0.55);
  font-weight: 500;
  margin-top: 6px;
  letter-spacing: 0.05em;
}

/* PROGRESS — SINGLE BAR */
.progress-wrap {
  margin-bottom: 0;
}

.progress-single {
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  overflow: hidden;
  position: relative;
  margin-bottom: 10px;
}
.progress-single-fill {
  height: 100%;
  width: 32%;
  background: linear-gradient(90deg, var(--gold) 0%, var(--gold-light) 100%);
  border-radius: 4px;
  position: relative;
  box-shadow: 0 0 12px rgba(201,168,76,0.4);
}
.progress-single-fill::after {
  content: '';
  position: absolute;
  right: -4px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  background: var(--gold);
  border-radius: 50%;
  box-shadow: 0 0 0 3px rgba(201,168,76,0.2), 0 0 14px rgba(201,168,76,0.6);
}

.progress-times {
  display: flex;
  justify-content: space-between;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 500;
}
.progress-time-current { color: var(--gold-light); }
.progress-time-total { color: rgba(255,255,255,0.4); }

/* CONTROLS */
.controls {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 36px;
  margin: 0;
}

.control-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  cursor: pointer;
  color: rgba(255,255,255,0.75);
  background: none;
  border: none;
  transition: color 0.2s ease;
  position: relative;
}
.control-btn:hover { color: var(--white); }

.control-btn-icon {
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

.skip-num {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  margin-top: 2px;
  font-size: 0.62rem;
  font-weight: 700;
  font-family: 'DM Sans', sans-serif;
  color: inherit;
}

.control-btn-label {
  font-size: 0.6rem;
  font-weight: 500;
  color: rgba(255,255,255,0.4);
  letter-spacing: 0.04em;
}

.play-btn-main {
  width: 76px;
  height: 76px;
  border-radius: 50%;
  background: var(--gold);
  border: none;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 10px 36px rgba(201,168,76,0.5), 0 0 0 8px rgba(201,168,76,0.08);
  cursor: pointer;
  transition: transform 0.15s ease;
}
.play-btn-main:hover { transform: scale(1.04); }

.pause-bars {
  display: flex;
  gap: 5px;
}
.pause-bars div {
  width: 5px;
  height: 26px;
  background: var(--g900);
  border-radius: 2px;
}

/* SPEED CHIP */
.speed-chip {
  font-family: 'DM Mono', monospace;
  font-size: 0.78rem;
  font-weight: 700;
  color: var(--gold-light);
  background: rgba(201,168,76,0.08);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 14px;
  padding: 5px 10px;
  display: inline-block;
}

/* CHAPTERS SECTION */
.chapters-section {
  margin-top: 12px;
}

.chapters-header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 14px;
}

.chapters-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--white);
}

.chapters-count {
  font-size: 0.65rem;
  color: var(--text-dim);
  font-weight: 400;
  letter-spacing: 0.04em;
}

.chapter-list {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.chapter-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 12px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.06);
  cursor: pointer;
  transition: background 0.2s ease, border-color 0.2s ease;
}
.chapter-item:hover {
  background: rgba(255,255,255,0.05);
  border-color: rgba(201,168,76,0.2);
}
.chapter-item.now-playing {
  background: rgba(201,168,76,0.07);
  border-color: rgba(201,168,76,0.3);
}
.chapter-item.played .chapter-time { color: rgba(255,255,255,0.3); }
.chapter-item.played .chapter-name { color: rgba(255,255,255,0.5); }

.chapter-time {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  font-weight: 600;
  color: var(--gold-light);
  width: 38px;
  flex-shrink: 0;
}
.chapter-item.now-playing .chapter-time { color: var(--gold); }

.chapter-content {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}

.chapter-name {
  font-size: 0.78rem;
  color: var(--white);
  font-weight: 500;
  line-height: 1.3;
}

.chapter-source {
  font-size: 0.6rem;
  color: rgba(255,255,255,0.4);
  font-weight: 400;
  letter-spacing: 0.02em;
  display: flex;
  align-items: center;
  gap: 4px;
}
.chapter-source-tag {
  background: rgba(201,168,76,0.08);
  color: var(--gold-light);
  padding: 1px 6px;
  border-radius: 6px;
  font-size: 0.55rem;
  font-weight: 600;
  letter-spacing: 0.04em;
}

.chapter-link {
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: rgba(255,255,255,0.04);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: rgba(255,255,255,0.5);
}
.chapter-item:hover .chapter-link { color: var(--gold); background: rgba(201,168,76,0.1); }

.chapter-now-indicator {
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  box-shadow: 0 0 8px var(--gold);
  animation: pulse 2s ease-in-out infinite;
  flex-shrink: 0;
}

/* Footer note */
.footer-note {
  text-align: center;
  margin-top: 24px;
  color: rgba(255,255,255,0.2);
  font-size: 0.7rem;
  font-weight: 300;
  font-style: italic;
}
</style>
</head>
<body>

<div class="page-title">
  <h1>Briefdex — Player Screen</h1>
  <p>Now playing · Daily Wrap · Tuesday 12 May 2026</p>
</div>

<div class="phone">
  <div class="screen">

    <!-- Status Bar -->
    <div class="status-bar">
      <span>7:42</span>
      <div class="status-icons">
        <div class="signal-dots"><div></div><div></div><div></div><div></div></div>
        <div class="wifi-icon"></div>
        <div class="battery"><div class="battery-fill"></div></div>
      </div>
    </div>

    <!-- Top Nav -->
    <div class="player-top">
      <div class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="6 9 12 15 18 9"/>
        </svg>
      </div>
      <div class="player-top-label">
        <div class="player-top-eyebrow">Now Playing</div>
        <div class="player-top-title">From All channels</div>
      </div>
      <div class="icon-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="1"/>
          <circle cx="12" cy="5" r="1"/>
          <circle cx="12" cy="19" r="1"/>
        </svg>
      </div>
    </div>

    <!-- Player Content -->
    <div class="player-content">

      <!-- Cover Art - fills available space -->
      <div class="cover-art">
        <div class="cover-eyebrow">Today's Briefing</div>
        <div class="cover-main">
          <div class="cover-script">The Daily Wrap</div>
          <div class="cover-title">Markets before<br>your first coffee.</div>
          <div class="cover-date">TUE · 12 MAY 2026 · 7 MIN</div>
        </div>
      </div>

      <!-- Bottom Controls Stack -->
      <div class="bottom-stack">

        <!-- Progress (Single bar) -->
        <div class="progress-wrap">
          <div class="progress-single">
            <div class="progress-single-fill"></div>
          </div>
          <div class="progress-times">
            <div class="progress-time-current">2:14</div>
            <div class="progress-time-total">7:00</div>
          </div>
        </div>

        <!-- Controls -->
        <div class="controls">
          <button class="control-btn">
            <div class="control-btn-icon" style="width: 40px; height: 40px;">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 9 A 11 11 0 1 0 31 20"/>
                <path d="M14 4 L20 9 L14 14"/>
              </svg>
              <div class="skip-num">15</div>
            </div>
          </button>

          <button class="play-btn-main">
            <div class="pause-bars">
              <div></div>
              <div></div>
            </div>
          </button>

          <button class="control-btn">
            <div class="control-btn-icon" style="width: 40px; height: 40px;">
              <svg width="40" height="40" viewBox="0 0 40 40" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 9 A 11 11 0 1 1 9 20"/>
                <path d="M26 4 L20 9 L26 14"/>
              </svg>
              <div class="skip-num">15</div>
            </div>
          </button>
        </div>

        <!-- Speed Control Row -->
        <div style="display: flex; justify-content: center;">
          <button class="speed-chip">1.0x</button>
        </div>

      </div>

    </div>

  </div>
</div>

<div class="footer-note">Player screen · MVP · Play, pause, scrub, skip, speed · Briefdex May 2026</div>

</body>
</html>
